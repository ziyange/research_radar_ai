name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  phase-1:
    name: Phase 1 acceptance checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: test
      AI_PROVIDER: mock
      RETRIEVAL_PROVIDER: mock
      DATABASE_URL: sqlite+memory://ci
      RUN_LIVE_RETRIEVAL_TESTS: "0"
      RUN_POSTGRES_TESTS: "0"
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8010/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Backend tests
        run: uv run python -m pytest

      - name: Ruff
        run: uv run ruff check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Web lint
        run: npm run lint:web

      - name: Web typecheck
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: Web build
        run: npm run build

      - name: Recommendation evaluation
        run: uv run python services/api/evals/recommendation_eval.py --top-n 10

      - name: AI safety evaluation
        run: uv run python services/api/evals/ai_safety_eval.py
