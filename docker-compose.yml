services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research-radar-postgres
    environment:
      POSTGRES_USER: research_radar
      POSTGRES_PASSWORD: research_radar
      POSTGRES_DB: research_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: research-radar-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: research-radar-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: research_radar
      MINIO_ROOT_PASSWORD: research_radar_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:

